<style>

/* =========================
GLOBAL PAGE STYLE
========================= */

body{
margin:0;
background:#fcf7f4;
font-family:"Playpen Sans Deva", cursive;
color:#7d585c;
}


/* =========================
NAVBAR
========================= */

nav{

display:flex;
align-items:center;
justify-content:space-between;

padding:0 80px;
height:75px;

background:#faf2f0;

box-shadow:0 3px 10px rgba(0,0,0,0.05);

}


/* LOGO */

.logo img{
width:165px;
cursor:pointer;
}


/* NAV LINKS */

.nav-links{

display:flex;
gap:40px;

list-style:none;
padding:0;
margin:0;

align-items:center;

}


.nav-links a{

text-decoration:none;
color:#7d585c;
font-weight:500;

transition:0.25s;

}


.nav-links a:hover{
color:#E88CA2;
}


/* =========================
DROPDOWN
========================= */

.dropdown{
position:relative;
}


.dropdown-menu{

position:absolute;

top:45px;
left:0;

background:white;

width:220px;

border-radius:12px;

box-shadow:0 15px 35px rgba(0,0,0,0.08);

list-style:none;

padding:8px 0;
margin:0;

opacity:0;
visibility:hidden;

transform:translateY(8px);

transition:0.25s;

}


.dropdown:hover .dropdown-menu{

opacity:1;
visibility:visible;

transform:translateY(0);

}


/* dropdown items */

.dropdown-menu li{

padding:12px 18px;

font-size:14px;

white-space:nowrap;

cursor:pointer;

transition:0.2s;

}


.dropdown-menu li:not(:last-child){
border-bottom:1px solid #f3e6e8;
}


.dropdown-menu li:hover{

background:#fff3f6;
color:#E88CA2;

}


/* =========================
START BUTTON
========================= */

.start-btn{

background:#fdf2f1;

border:2px solid #E88CA2;

padding:10px 26px;

border-radius:25px;

font-weight:600;

color:#7d585c;

cursor:pointer;

transition:0.25s;

}


.start-btn:hover{

background:#E88CA2;
color:white;
transform:scale(1.05);

}



/* =========================
HERO SECTION
========================= */

.hero{

display:flex;
align-items:center;
justify-content:space-between;

padding:80px 120px;

background:#fefbf9;

border-top:3px solid #f7f1f0;
/* box-shadow: 0px 2px 10px rgba(255, 192, 203, 0.46); */
}


/* HERO TEXT */

.hero-text{
max-width:520px;
}


/* HEADING */

.hero-text h1{
color: #69414c;
font-size:60px;

line-height:1.3;

margin-bottom:20px;
 font-family: 'Dancing Script', cursive;
font-weight:600;

}


/* DESCRIPTION */

.hero-text p{

font-size:18px;

color:#8b6d71;

margin-bottom:30px;

}


/* HERO BUTTON */

.hero-btn{

background:#E88CA2;

border:none;

padding:16px 36px;

border-radius:30px;

font-size:16px;

font-weight:600;

color:white;

cursor:pointer;

transition:0.3s;

box-shadow:0 8px 25px rgba(232,140,162,0.35);

}


.hero-btn:hover{

transform:translateY(-3px);
background:#d97790;

}


/* HERO IMAGE */

.hero-images{

position:relative;

}


.hero-main{

width:500px;

border-radius:12px;

box-shadow:0 10px 40px rgba(255, 192, 203, 0.799);

}


/* =========================
FEATURE STRIP
========================= */

.features{

display:flex;

justify-content:center;
align-items:center;

gap:40px;

padding:20px;

background:#fdf6f4;

border-top:2px solid #f3e7e6;

}


.feature{

display:flex;
align-items:center;

gap:10px;

font-size:16px;

}


/* divider */

.divider{

height:20px;
width:1px;

background:#e8d8d6;

}

.styles{
  padding-top: 35px;
    background-color: #fef3f1;
    display: flex;
    align-items: center;
    flex-direction: column;
border-top:3px solid #f7f1f0;
box-shadow: 0px -1px 10px rgba(255, 192, 203, 0.46);
}
.styles-text{
    width: 650px;
}
.styles-photo{
    width: 80%;
}



.floral-footer {
  background: #fdf6f9; /* soft pastel */
  padding: 40px 20px;
  text-align: center;
  position: relative;
  font-family: 'Poppins', sans-serif;
  color: #444;
}

/* Decorative flowers on left and right */
.floral-footer::before,
.floral-footer::after {
  content: "";
  position: absolute;
  top: 0;
  width: 120px;
  height: 100%;
  background-repeat: no-repeat;
  background-size: contain;
}

.floral-footer::before {
  left: 0;
  background-image: url("left-floral.png"); /* pastel floral graphic */
}

.floral-footer::after {
  right: 0;
  background-image: url("right-floral.png"); /* pastel floral graphic */
}



.floral-footer {
  background: #fdf6f9;
  padding: 60px 20px;
  text-align: center;
  position: relative;
  font-family: 'Poppins', sans-serif;
  color: #444;
  overflow: hidden; /* ensures decorations don’t spill out */
}

/* Decorative elements */
.footer-decor {
  position: absolute;
}

.footer-decor.left {
  left: 10px;
  bottom: 0;
  width: 120px;
}

.footer-decor.right {
  right: 10px;
  bottom: 0;
  width: 120px;
}

.footer-decor.heart {
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
}

/* Responsive: hide on mobile */
@media (max-width: 768px) {
  .footer-decor {
    display: none;
  }
}






</style>
</head>
